<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 명함 이력서</title>
    <link rel="stylesheet" href="resume_style.css">
</head>
<body>

    <!-- 명함 전체를 감싸는 상자 -->
    <div class="card">
        
        <!-- 왼쪽: 프로필 사진과 이름 -->
        <div class="card-left">
            <img src="my_profile.jpg" alt="프로필 사진" class="profile-img">
            <h1>남한솔</h1>
            <p class="subtitle">Junior Web Developer</p>
        </div>

        <!-- 오른쪽: 상세 정보 및 링크 -->
        <div class="card-right">
            <h2>Information</h2>
            <ul>
                <li><strong>연락처:</strong> 010-1234-5678</li>
                <li><strong>이메일:</strong> email@example.com</li>
                <li><strong>GitHub:</strong> <a href="https://github.com/solia142" target="_blank">방문하기</a></li>
            </ul>

            <h2>Hobby</h2>
            <p>코딩하기, 영화보기</p>
        </div>

    </div>

</body>
</html>
